  <!-- Page Content -->

    <!-- Menu icon to open sidebar -->

    <!-- Header -->
    <header class="w3-container w3-center" style="padding:128px 16px" id="home">

      <div class="w3-container">

        </h5>

        <p>
          <a href="https://scholar.google.com/citations?user=sIJPorYAAAAJ&hl=en&oi=ao" style="text-decoration:none">

          </a>

            <iconify-icon icon="academicons:orcid"
              class="fa-fw w3-margin-right w3-xxlarge w3-text-blue-grey w3-hover-opacity"></iconify-icon>
          </a>
          <a href="https://www.researchgate.net/profile/Abbas-Safardoost" style="text-decoration:none">

          <a href="https://github.com/asdoost" style="text-decoration:none">

      <!-- <img src="imgs/MyPhoto.jpg" class="w3-image w3-hide-large w3-hide-small w3-round"
        style="display:block;width:60%;margin:auto;">
      <img src="imgs/MyPhoto.jpg" class="w3-image w3-hide-large w3-hide-medium w3-round" width="1000" height="1333"> -->
    </header>
    <!-- End Header Section -->

    <center>
      <div class="switch">
        <input id="language-toggle" class="check-toggle check-toggle-round-flat" type="checkbox" onclick="openurl()">
        <label for="language-toggle"></label>
        <span class="on">EN</span>
        <span class="off">FA</span>
      </div>
    </center>

    <div class="theme-container shadow-dark">
      <img id="theme-icon" src="icons/moon.svg" alt="ERR">
    </div>

    <script>
      // Open and close sidebar
      document.body.style = "background-color: var(--bs-dark); color: var(--bs-light) ;transition: 0.5s;"
      const sun = "icons/sun.svg";
      const moon = "icons/moon.svg"

      var theme = "dark";
      const root = document.querySelector(":root");
      const container = document.getElementsByClassName("theme-container")[0];
      const themeIcon = document.getElementById("theme-icon");
      container.addEventListener("click", setTheme);
      function setTheme() {
        switch (theme) {
          case "dark":
            setLight();
            theme = "light";
            break;
          case "light":
            setDark();
            theme = "dark";
            break;
        }
      }
      function setLight() {
        root.style.setProperty(
          "--bs-dark",
          "linear-gradient(318.32deg, #c3d1e4 0%, #dde7f3 55%, #d4e0ed 100%)"
        );
        container.classList.remove("shadow-dark");
        setTimeout(() => {
          container.classList.add("shadow-light");
          themeIcon.classList.remove("change");
        }, 300);
        themeIcon.classList.add("change");
        themeIcon.src = sun;
      }
      function setDark() {
        root.style.setProperty("--bs-dark", "#212529");
        container.classList.remove("shadow-light");
        setTimeout(() => {
          container.classList.add("shadow-dark");
          themeIcon.classList.remove("change");
        }, 300);
        themeIcon.classList.add("change");
        themeIcon.src = moon;
      }

      function openNav() {
        document.getElementById("mySidebar").style.width = "70%";
        document.getElementById("mySidebar").style.display = "block";
      }

      function closeNav() {
        document.getElementById("mySidebar").style.display = "none";
      }

      function openurl() {
        window.open("pages/Home-fa.htm", "_self")
      }
    </script>

</body>

</html>
