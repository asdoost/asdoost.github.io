<body>
  <!-- Sidebar with image -->
  <nav class="w3-sidebar w3-hide-medium w3-hide-small" style="width:30%">
    <div class="bgimg"></div>
  </nav>

  <!-- Hidden Sidebar (reveals when clicked on menu icon)-->
  <nav class="w3-sidebar w3-black w3-animate-right w3-xxlarge" style="display:none;padding-top:150px;right:0;z-index:2"
    id="mySidebar">
    <a href="javascript:void(0)" onclick="closeNav()" class="w3-button w3-black w3-xxxlarge w3-display-topright"
      style="padding:0 12px;">
      <i class="fa fa-remove"></i>
    </a>

    <div class="w3-bar-block w3-center">
      <a href="../index.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black" onclick="closeNav()">Home</a>
      <a href="Resume-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black" onclick="closeNav()">Resume</a>
      <a href="Blog-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black" onclick="closeNav()">Blog</a>
      <a href="Tutorial-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black"
        onclick="closeNav()">Tutorials</a>
      <a href="NoteBooks-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black"
        onclick="closeNav()">NoteBooks</a>
      <a href="About-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black" onclick="closeNav()">About</a>
      <a href="Contact-en.htm" class="w3-bar-item w3-button w3-text-grey w3-hover-black"
        onclick="closeNav()">Contact</a>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="w3-main w3-padding-large" style="margin-left:30%">

    <!-- Menu icon to open sidebar -->
    <span class="w3-button w3-top w3-xxlarge w3-text-grey w3-hover-text-black" style="width:auto;right:0;"
      onclick="openNav()"><i class="fa fa-bars"></i></span>

    <!-- Header -->
    <header class="w3-container w3-center" id="home">
      <div class="w3-content w3-justify w3-text-grey w3-padding-32" id="about">
        <h2>Tutorials</h2>
        <hr style="border-color: #607d8b; border-width: 2px;">
      </div>
    </header>
  </div>
  <!-- End Header Section -->

  <div class="theme-container shadow-dark">
    <img id="theme-icon" src="../icons/moon.svg" alt="ERR">
  </div>

  <script>
    document.body.style = "background-color: var(--bs-dark); color: var(--bs-light) ;transition: 0.5s;"
    const sun = "../icons/sun.svg";
    const moon = "../icons/moon.svg"

    var theme = "dark";
    const root = document.querySelector(":root");
    const container = document.getElementsByClassName("theme-container")[0];
    const themeIcon = document.getElementById("theme-icon");
    container.addEventListener("click", setTheme);
    function setTheme() {
      switch (theme) {
        case "dark":
          setLight();
          theme = "light";
          break;
        case "light":
          setDark();
          theme = "dark";
          break;
      }
    }
    function setLight() {
      root.style.setProperty(
        "--bs-dark",
        "linear-gradient(318.32deg, #c3d1e4 0%, #dde7f3 55%, #d4e0ed 100%)"
      );
      container.classList.remove("shadow-dark");
      setTimeout(() => {
        container.classList.add("shadow-light");
        themeIcon.classList.remove("change");
      }, 300);
      themeIcon.classList.add("change");
      themeIcon.src = sun;
    }
    function setDark() {
      root.style.setProperty("--bs-dark", "#212529");
      container.classList.remove("shadow-light");
      setTimeout(() => {
        container.classList.add("shadow-dark");
        themeIcon.classList.remove("change");
      }, 300);
      themeIcon.classList.add("change");
      themeIcon.src = moon;
    }

    // Open and close sidebar
    function openNav() {
      document.getElementById("mySidebar").style.width = "70%";
      document.getElementById("mySidebar").style.display = "block";
    }

    function closeNav() {
      document.getElementById("mySidebar").style.display = "none";
    }

  </script>
</body>

</html>
